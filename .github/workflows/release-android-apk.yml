name: Release Android APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Verify EAS project is linked
        run: |
          node -e "
            const app = require('./app.json');
            const projectId = app.expo?.extra?.eas?.projectId;
            if (!projectId) {
              console.error('Missing expo.extra.eas.projectId in app.json');
              console.error('Run: npx eas-cli init');
              process.exit(1);
            }
            console.log('EAS projectId:', projectId);
          "

      - name: Link EAS project
        run: eas init --id 6e3c21e7-b5e3-4983-a0ef-f05c8f6e9a00 --non-interactive --force
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"

      - name: Build APK in cloud
        id: build
        env:
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --json > build-output.json
          BUILD_ID=$(node -e "const r=require('./build-output.json'); console.log(Array.isArray(r)?r[0].id:r.id)")
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Show build details on failure
        if: failure() && steps.build.outputs.build_id != ''
        run: npx eas-cli build:view "${{ steps.build.outputs.build_id }}" --json

      - name: Download APK
        id: download
        run: |
          APK_PATH=$(eas build:download \
            --build-id "${{ steps.build.outputs.build_id }}" \
            --non-interactive \
            --json | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).path))")
          cp "$APK_PATH" showfy.apk
          ls -lh showfy.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.tag }}
          name: Showfy ${{ steps.build.outputs.tag }}
          body: |
            ## Install on Android

            1. Download `showfy.apk` below
            2. Open it on your phone
            3. Allow install from browser/files if asked

            The app connects to `https://proxy.previewcloud.cloud`.
          files: showfy.apk
          draft: false
          prerelease: false

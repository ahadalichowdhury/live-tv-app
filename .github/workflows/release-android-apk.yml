name: Release Android APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo / EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK in cloud
        id: build
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --json > build-output.json
          BUILD_ID=$(node -e "const r=require('./build-output.json'); console.log(Array.isArray(r)?r[0].id:r.id)")
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          eas build:download \
            --id "${{ steps.build.outputs.build_id }}" \
            --output live-tv.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.tag }}
          name: Live TV ${{ steps.build.outputs.tag }}
          body: |
            ## Install on Android

            1. Download `live-tv.apk` below
            2. Open it on your phone
            3. Allow install from browser/files if asked

            The app connects to `https://proxy.previewcloud.cloud`.
          files: live-tv.apk
          draft: false
          prerelease: false
